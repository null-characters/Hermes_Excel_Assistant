# Prometheus 配置 - Hermes Work Assistant

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - alerts.yml

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Hermes Agent
  - job_name: 'hermes'
    static_configs:
      - targets: ['hermes:8645']

  # File Upload Service
  - job_name: 'file-upload'
    static_configs:
      - targets: ['file-upload:8000']

  # MinIO
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']

  # Nginx (需要 nginx-prometheus-exporter)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-proxy:80']