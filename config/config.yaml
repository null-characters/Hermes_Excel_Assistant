# Hermes Agent 配置文件
# Hermes Excel Assistant - 本地化方案

# LLM 配置
provider: ${HERMES_PROVIDER}
model: ${HERMES_MODEL}

# Terminal 后端配置 (安全关键)
terminal:
  backend: docker
  docker_image: python:3.11-slim
  # 安全配置
  network_disabled: true
  timeout: 300
  read_only_root: true
  max_processes: 100
  container_cpu: 1
  container_memory: 2048

# 文件处理配置
file_processing:
  upload_service_url: http://file-upload:8000
  minio:
    endpoint: minio:9000
    bucket: ${MINIO_BUCKET}
  
# 技能配置
skills:
  enabled:
    - excel_processor
    - progress_notifier
    - file_validator
  path: /root/.hermes/skills

# 内存配置
memory:
  enabled: true
  path: /app/data/memory

# 日志配置
logging:
  level: ${LOG_LEVEL:-INFO}
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 注意：企业微信回调配置已废弃
# 当前方案为本地化部署，通过 Hermes Bridge API 提交任务
# 如需恢复企微集成，请参考 git 历史中的配置