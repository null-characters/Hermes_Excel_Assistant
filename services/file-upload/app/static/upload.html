<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件上传 - Hermes WeCom Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        
        #file-input {
            display: none;
        }
        
        .file-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            font-weight: 500;
            color: #333;
            word-break: break-all;
        }
        
        .file-size {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .user-input {
            margin-bottom: 20px;
        }
        
        .user-input label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .user-input input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .user-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .progress {
            margin-top: 20px;
            display: none;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
        }
        
        .result.error {
            background: #ffebee;
            border: 1px solid #ffcdd2;
        }
        
        .result.show {
            display: block;
        }
        
        .result-text {
            color: #333;
            font-size: 14px;
            text-align: center;
        }
        
        .file-id-box {
            background: #f5f5f5;
            border-radius: 4px;
            padding: 8px;
            margin-top: 12px;
            font-family: monospace;
            word-break: break-all;
            text-align: center;
        }
        
        .jump-btn {
            margin-top: 12px;
            background: #07c160;
            color: white;
        }
        
        .jump-btn:hover {
            background: #06ad56;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>文件上传</h1>
            <p>上传文件，在企微聊天中发送处理指令</p>
        </div>
        
        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传</div>
            <div class="upload-hint">支持 Excel/Word/PPT/PDF/CSV/JSON/TXT/图片等格式，最大 50MB</div>
            <input type="file" id="file-input" accept=".xlsx,.xls,.docx,.doc,.pptx,.ppt,.pdf,.csv,.json,.xml,.txt,.png,.jpg,.jpeg,.gif,.webp,.zip,.tar,.gz">
        </div>
        
        <div class="file-info" id="file-info">
            <div class="file-name" id="file-name"></div>
            <div class="file-size" id="file-size"></div>
        </div>
        
        <div class="user-input">
            <label for="user-id">用户 ID</label>
            <input type="text" id="user-id" placeholder="请输入企微用户ID" required>
        </div>
        
        <button class="btn btn-primary" id="upload-btn" disabled>上传文件</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text">上传中...</div>
        </div>
        
        <div class="result" id="result">
            <div class="result-text" id="result-text"></div>
            <div class="file-id-box" id="file-id-box"></div>
            <button class="btn jump-btn" id="jump-btn">跳转到企微聊天</button>
        </div>
    </div>
    
    <script>
        // 从 URL 参数获取用户ID
        const urlParams = new URLSearchParams(window.location.search);
        const userIdParam = urlParams.get('user_id');
        if (userIdParam) {
            document.getElementById('user-id').value = userIdParam;
        }
        
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const userIdInput = document.getElementById('user-id');
        const uploadBtn = document.getElementById('upload-btn');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const result = document.getElementById('result');
        const resultText = document.getElementById('result-text');
        const fileIdBox = document.getElementById('file-id-box');
        const jumpBtn = document.getElementById('jump-btn');
        
        let selectedFile = null;
        let uploadedFileId = null;
        
        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        // 用户ID输入
        userIdInput.addEventListener('input', updateUploadButton);
        
        function handleFile(file) {
            // 验证文件类型（通过扩展名）
            const ext = file.name.split('.').pop().toLowerCase();
            const allowedExtensions = [
                'xlsx', 'xls', 'docx', 'doc', 'pptx', 'ppt',
                'pdf', 'csv', 'json', 'xml', 'txt',
                'png', 'jpg', 'jpeg', 'gif', 'webp',
                'zip', 'tar', 'gz'
            ];
            
            if (!allowedExtensions.includes(ext)) {
                alert('不支持的文件类型: ' + ext + '\n支持的格式: ' + allowedExtensions.join(', '));
                return;
            }
            
            // 验证文件大小 (50MB)
            if (file.size > 50 * 1024 * 1024) {
                alert('文件大小不能超过 50MB');
                return;
            }
            
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);
            fileInfo.classList.add('show');
            updateUploadButton();
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function updateUploadButton() {
            uploadBtn.disabled = !(selectedFile && userIdInput.value.trim());
        }
        
        // 上传文件
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !userIdInput.value.trim()) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            const userId = userIdInput.value.trim();
            
            // 显示进度
            progress.classList.add('show');
            result.classList.remove('show');
            uploadBtn.disabled = true;
            progressFill.style.width = '0%';
            progressText.textContent = '上传中...';
            
            try {
                const response = await fetch(`/api/upload?user_id=${encodeURIComponent(userId)}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    progressFill.style.width = '100%';
                    progressText.textContent = '上传成功！';
                    
                    uploadedFileId = data.file_id;
                    
                    // 显示结果
                    result.classList.add('show', 'success');
                    resultText.textContent = '文件上传成功！';
                    fileIdBox.textContent = data.file_id;
                } else {
                    throw new Error(data.detail || '上传失败');
                }
            } catch (error) {
                result.classList.add('show', 'error');
                resultText.textContent = '上传失败: ' + error.message;
                fileIdBox.textContent = '';
            } finally {
                progress.classList.remove('show');
                uploadBtn.disabled = false;
            }
        });
        
        // 跳转到企微聊天
        jumpBtn.addEventListener('click', () => {
            if (uploadedFileId) {
                // 构造预填消息
                const message = `处理 ${uploadedFileId}`;
                // 企微 scheme URL
                const wxworkUrl = `wxwork://message?content=${encodeURIComponent(message)}`;
                
                // 尝试打开企微
                window.location.href = wxworkUrl;
                
                // 备用：复制 file_id 到剪贴板
                navigator.clipboard.writeText(uploadedFileId).then(() => {
                    alert(`File ID 已复制: ${uploadedFileId}\n请在企微聊天中粘贴并发送处理指令`);
                });
            }
        });
    </script>
</body>
</html>
